<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IdeaMeow 灵感喵 - 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #0f172a;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #f8fafc;
    }
    .header .subtitle {
      font-size: 11px;
      color: #64748b;
    }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .builtin-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 10px;
      font-weight: 500;
    }
    .badge-gpt { background: #065f46; color: #6ee7b7; }
    .badge-kimi { background: #7c2d12; color: #fdba74; }
    .badge-gemini { background: #1e3a5f; color: #93c5fd; }
    .badge-claude { background: #4c1d95; color: #c4b5fd; }
    .badge-doubao { background: #064e3b; color: #6ee7b7; border: 1px solid #059669; }
    .badge-deepseek { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .badge-custom { background: #1e293b; color: #fde047; border: 1px solid #854d0e; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .input-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus {
      border-color: #3b82f6;
    }
    .input-row input::placeholder {
      color: #475569;
    }
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-primary:hover {
      background: #1d4ed8;
    }
    .btn-danger {
      background: transparent;
      color: #f87171;
      border: 1px solid #7f1d1d;
    }
    .btn-danger:hover {
      background: #7f1d1d;
    }
    .btn-sm { padding: 3px 10px; font-size: 10px; }

    .custom-list {
      list-style: none;
    }
    .custom-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 11px;
      font-family: monospace;
      word-break: break-all;
    }
    .custom-list li span {
      flex: 1;
      margin-right: 8px;
    }
    .empty-hint {
      font-size: 11px;
      color: #475569;
      font-style: italic;
      padding: 8px 0;
    }
    .status-msg {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .status-msg.success {
      display: block;
      background: #064e3b;
      color: #6ee7b7;
      border: 1px solid #065f46;
    }
    .status-msg.error {
      display: block;
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #991b1b;
    }
    .help-text {
      font-size: 10px;
      color: #64748b;
      margin-top: 4px;
      line-height: 1.4;
    }
    .divider {
      border: 0;
      border-top: 1px solid #1e293b;
      margin: 14px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🐾 IdeaMeow 灵感喵</h1>
      <div class="subtitle">浏览器插件 · 自定义网址配置</div>
    </div>
  </div>

  <!-- Built-in supported sites -->
  <div class="section">
    <div class="section-title">📋 预设支持的 AI 平台</div>
    <div class="builtin-list">
      <span class="badge badge-gpt">ChatGPT</span>
      <span class="badge badge-kimi">Kimi</span>
      <span class="badge badge-doubao">豆包</span>
      <span class="badge badge-deepseek">DeepSeek</span>
      <span class="badge badge-gemini">Gemini</span>
      <span class="badge badge-claude">Claude</span>
    </div>
  </div>

  <hr class="divider">

  <!-- Custom URL management -->
  <div class="section">
    <div class="section-title">➕ 添加自定义网址</div>
    <div class="input-row">
      <input
        type="text"
        id="urlInput"
        placeholder="例如: chat.example.com 或 *.example.com"
      />
      <button class="btn btn-primary" id="addBtn">添加</button>
    </div>
    <div class="help-text">
      支持通配符 <code>*</code> 和 <code>?</code>。<br>
      示例：<code>*example.com*</code> 匹配该域名下所有页面。
    </div>
    <div id="statusMsg" class="status-msg"></div>
  </div>

  <!-- Custom URL list -->
  <div class="section">
    <div class="section-title">🔧 我的自定义网址</div>
    <ul class="custom-list" id="customList">
      <li class="empty-hint">暂无自定义网址，在上方添加</li>
    </ul>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-title">ℹ️ 如何使用</div>
    <div class="help-text">
      1. 在上面添加你想适配的 AI 对话网站域名<br>
      2. 打开该网站，刷新页面<br>
      3. 划词选中文本，点击悬浮的「🐾 喵一下」<br>
      4. 灵感卡片自动飞入 IdeaMeow 工作台！
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
